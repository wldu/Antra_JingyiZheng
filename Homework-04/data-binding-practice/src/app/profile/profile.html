<h1>Welcome,  {{ profileForm.get('name')?.value }}!</h1>

<form [formGroup] = "profileForm">
    <label>Name: </label>
    <input formControlName = "name" />

    <br>

    <label>Email: </label>
    <input formControlName = "email"/>

    <br>

    <label>Date of Birth: </label>
    <input formControlName = "dateOfBirth"/>

    <br>

    <button (click)="reset()" [disabled]="!profileForm.valid">Reset</button>
    <button (click)="save()" [disabled]="!profileForm.valid">Save {{ count }} times</button>
</form>
